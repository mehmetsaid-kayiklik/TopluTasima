name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Lint, Test, Debug APK
    runs-on: ubuntu-latest
    env:
      RMV_ACCESS_ID: ${{ secrets.RMV_ACCESS_ID || 'ci-placeholder-rmv' }}
      ORS_API_KEY: ${{ secrets.ORS_API_KEY || 'ci-placeholder-ors' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Firebase
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: bash .github/scripts/configure-firebase.sh

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Lint
        run: ./gradlew lintDebug

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: toplu-tasima-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  release-artifact:
    name: Release APK Artifact
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      RMV_ACCESS_ID: ${{ secrets.RMV_ACCESS_ID || 'ci-placeholder-rmv' }}
      ORS_API_KEY: ${{ secrets.ORS_API_KEY || 'ci-placeholder-ors' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Firebase
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: bash .github/scripts/configure-firebase.sh

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble release
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: toplu-tasima-release-apk
          path: app/build/outputs/apk/release/*.apk
